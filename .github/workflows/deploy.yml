name: Deploy to Server

on:
  push:
    branches: [ main, master ]
  repository_dispatch:
    types: [ docs_updated ]

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    # Раскомментируйте строку ниже, когда захотите, чтобы деплой шел только после успешных тестов
    # needs: [test] 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Переходим в папку проекта
            cd /var/www/tanhio.dev || exit
            
            # Подтягиваем последние изменения основного сайта
            git pull origin main
            
            # Обновление документации из внешнего репозитория
            echo "Updating documentation from cyanide-honeypot..."
            mkdir -p temp_docs
            git clone --depth 1 https://github.com/tanhiowyatt/cyanide-honeypot.git temp_docs
            rm -rf sites/cyanide/docs
            mkdir -p sites/cyanide/docs
            cp -r temp_docs/docs/* sites/cyanide/docs/
            rm -rf temp_docs
            
            # Устанавливаем зависимости
            npm install --production
            
            # Перезапускаем приложение
            pm2 restart tanhio-site || pm2 start infra/server.js --name "tanhio-site"
            
            # Опционально: вывод логов для проверки
            pm2 status
