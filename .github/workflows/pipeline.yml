name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  repository_dispatch:
    types: [ docs_updated ]
  workflow_dispatch:

jobs:
  security:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep ci --config auto --config p/nginx --config p/security-audit \
            --exclude-rule html.security.audit.missing-integrity.missing-integrity \
            --exclude-rule generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit
        run: npm audit --audit-level=high

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --debug --only-verified

  links:
    name: Link Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --exclude-mail --verbose --no-progress './**/*.md' './**/*.html'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tests:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Root)
        run: npm install

      - name: Install dependencies (Tests)
        run: |
          cd tests
          npm install

      - name: Install Playwright Browsers
        run: |
          cd tests
          npx playwright install --with-deps

      - name: Start Server and Run Tests
        run: |
          npm start &
          # Wait for server to be ready
          ./node_modules/.bin/wait-on http://localhost:5173 --timeout 30000
          # Run tests
          cd tests
          npm test

  integration:
    name: Server Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Start Server and Check Endpoints
        run: |
          npm start &
          # Wait for server to be ready
          ./node_modules/.bin/wait-on http://localhost:5173 --timeout 30000
          # Test main endpoints
          curl -f http://localhost:5173/
          curl -f http://localhost:5173/blog
          curl -f http://localhost:5173/app
          curl -f http://localhost:5173/projects

  iac_security:
    name: IaC Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./infra
          framework: all
          soft_fail: false
          quiet: true

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true

  deploy:
    name: Deploy Application
    needs: [security, audit, secrets, links, tests, integration, iac_security, lighthouse]
    if: github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/tanhio.dev || exit
            git pull origin main
            echo "Updating documentation from cyanide-honeypot..."
            mkdir -p temp_docs
            git clone --depth 1 https://github.com/tanhiowyatt/cyanide-honeypot.git temp_docs
            rm -rf sites/cyanide/docs
            mkdir -p sites/cyanide/docs
            cp -r temp_docs/docs/* sites/cyanide/docs/
            rm -rf temp_docs
            mkdocs build -f sites/cyanide/mkdocs.yml
            npm install --production
            npm run build:css
            pm2 restart tanhio-site || pm2 start infra/server.js --name "tanhio-site"
            pm2 status
