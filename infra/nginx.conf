# NGINX Configuration with Subdomains (SSL Terminated by WAF)
# Nginx listens ONLY on port 80 (HTTP) - WAF handles SSL and certificates

upstream tanhio_app {
    server localhost:5173;
}

# 🛠️ Maps for dynamic headers to avoid "add_header" shadowing issues
map $uri $cache_control_header {
    ~*\.(js|css|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|otf|eot|pdf)$ "public, immutable";
    default "no-cache";
}

map $uri $content_type_override {
    ~*\.pdf$ "application/pdf";
    default "";
}

# 🔥 MAIN SITE tanhio.dev & http -> https redirect
server {
    listen 80;
    listen [::]:80;
    server_name tanhio.dev www.tanhio.dev;

    # Global Security Headers - defined once, works everywhere
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control $cache_control_header always;
    
    # Anti-smuggling (Server level protection)
    underscores_in_headers off;
    ignore_invalid_headers on;
    proxy_set_header Upgrade "";
    proxy_set_header Connection "close";
    
    # Root for static files
    root /var/www/tanhio_site/main;
    index index.html;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/10s;

    # 1. Force HTTPS via WAF (X-Forwarded-Proto)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    location / {
        limit_req zone=general burst=50 nodelay;
        try_files $uri $uri/ @app;
    }

    # Proxy to Node.js App
    location @app {
        proxy_pass http://tanhio_app;
        proxy_http_version 1.1;
        proxy_request_buffering on;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Cache (No add_header here to avoid shadowing)
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|otf|eot)$ {
        expires 1y;
    }
}

# 🔥 CYANIDE DOCS cyanide.tanhio.dev
server {
    listen 80;
    listen [::]:80;
    server_name cyanide.tanhio.dev;
    
    # WAF HTTPS Redirect
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cache-Control $cache_control_header always;

    root /var/www/tanhio_site/cyanide;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|otf|eot)$ {
        expires 1y;
    }
}

# 🔥 RESUME cv.tanhio.dev
server {
    listen 80;
    listen [::]:80;
    server_name cv.tanhio.dev;
    
    # WAF HTTPS Redirect
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Cache-Control $cache_control_header always;
    # Apply PDF Content-Type if needed
    if ($content_type_override != "") {
        add_header Content-Type $content_type_override always;
    }

    root /var/www/tanhio_site/main/files;
    index tanhiowyatt_CV.pdf;

    location / {
        try_files $uri $uri/ /tanhiowyatt_CV.pdf;
    }
}

# Gzip
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
